name: TLA-BackendExtended Pipeline

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        cache: false
    #--- Test
    - name: Show working directory
      run: pwd

    - name: List files
      run: ls
    #---
    - name: Restore dependencies
      run: dotnet restore TLA-BackendExtended.sln

    - name: Build
      run: dotnet build TLA-BackendExtended.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test TLA-BackendExtended.sln --configuration Release --no-build --verbosity normal